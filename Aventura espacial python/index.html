<!DOCTYPE html>
<html>
<head>
    <title>Aventura Espacial</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 50px;
        }
        .container {
            border: 2px solid #00ff41;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 15px #00ff41;
        }
        button {
            background-color: #00ff41;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        button:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Aventura Espacial</h1>
        <hr color="#00ff41">
        
        <p style="font-size: 18px;">{{ dados.texto }}</p>

        <form method="POST">
            {% for opcao in dados.opcoes %}
                <button type="submit" name="proxima_fase" value="{{ opcao.escolha }}">
                    {{ opcao.texto }}
                </button>
            {% endfor %}
        </form>
    </div>
</body>
</html>
