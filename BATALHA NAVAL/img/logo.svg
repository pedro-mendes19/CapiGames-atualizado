<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: Deep Navy Rounded Square -->
  <rect width="512" height="512" rx="112" fill="#0a192f"/>
  
  <!-- Subtle Gradient Overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#172a45" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a192f" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#grad)"/>

  <!-- Radar/Crosshair Elements -->
  <circle cx="256" cy="256" r="180" stroke="#304769" stroke-width="4" fill="none"/>
  <circle cx="256" cy="256" r="130" stroke="#64ffda" stroke-width="12" fill="none" opacity="0.9"/>
  <circle cx="256" cy="256" r="80" stroke="#64ffda" stroke-width="6" fill="none" opacity="0.5"/>

  <!-- Crosslines -->
  <line x1="256" y1="56" x2="256" y2="456" stroke="#64ffda" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="56" y1="256" x2="456" y2="256" stroke="#64ffda" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

  <!-- Ship Silhouette -->
  <path d="M156,290 L356,290 L320,360 L192,360 Z" fill="#64ffda"/>
  <rect x="236" y="240" width="40" height="50" fill="#64ffda"/>
  
  <!-- Target Hit Blip -->
  <circle cx="340" cy="170" r="28" fill="#ff5252" stroke="#0a192f" stroke-width="4"/>
</svg>
