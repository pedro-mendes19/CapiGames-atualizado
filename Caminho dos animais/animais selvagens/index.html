<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labirinto dos Animais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-screen" class="screen-container fade-in">
        
        <div class="top-bar">
            <button class="btn-circle shadow" onclick="history.back()">
                ⬅
            </button>
        </div>

        <div class="menu-content text-center">
            <h1 class="main-title mb-4">
                <span class="c-1">E</span><span class="c-2">s</span><span class="c-3">c</span><span class="c-4">o</span><span class="c-5">l</span><span class="c-6">h</span><span class="c-1">a</span>
                <br>
                <span class="c-2">o</span>
                <span class="c-3">A</span><span class="c-4">n</span><span class="c-5">i</span><span class="c-6">m</span><span class="c-1">a</span><span class="c-2">l</span><span class="c-3">!</span>
            </h1>
            <h2 class="menu-subtitle">🌳 Animais Selvagens 🦁</h2>
            <div id="animal-buttons" class="d-flex flex-wrap gap-4 justify-content-center mt-4">
                </div>
        </div>
    </div>

    <div id="game-screen" class="screen-container d-none fade-in">
        
        <div class="container game-container py-3">
            <div class="d-flex justify-content-between align-items-center mb-3 w-100">
                <button id="btn-back" class="btn btn-warning rounded-pill shadow fw-bold px-4">
                    ⬅ Menu
                </button>
                <h3 id="game-title" class="m-0 title-font text-shadow">Gato</h3>
                <button id="btn-new-maze" class="btn btn-success rounded-pill shadow px-4">
                    🔄 Novo
                </button>
            </div>

            <div class="game-wrapper shadow-lg mx-auto">
                <canvas id="gameCanvas"></canvas>
                <div id="items-layer"></div>
            </div>

            <p class="instruction-text mt-3">Leve o animal até a comida!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
