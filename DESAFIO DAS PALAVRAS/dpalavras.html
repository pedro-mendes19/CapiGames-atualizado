<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio das Palavras </title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/logo.png">
    <style>
        :root {
            --primary: #FF8E72; /* Coral suave */
            --secondary: #6C5CE7; /* Roxo divertido */
            --accent: #00B894; /* Verde menta */
            --wrong: #FF7675; /* Vermelho suave */
            --bg-gradient: linear-gradient(135deg, #81ECEC 0%, #74B9FF 100%);
            --card-bg: #ffffff;
            --text-color: #2D3436;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Remove highlight de toque no mobile */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        /* Elementos flutuantes de fundo */
        .bg-shape {
            position: absolute;
            opacity: 0.2;
            z-index: 0;
            animation: float 6s infinite ease-in-out;
            pointer-events: none; /* Não interfere no clique */
        }
        .shape-1 { top: 10%; left: 10%; font-size: 4rem; animation-delay: 0s; }
        .shape-2 { bottom: 15%; right: 10%; font-size: 5rem; animation-delay: 1s; }
        .shape-3 { bottom: 20%; left: 20%; font-size: 3rem; animation-delay: 2s; }
        .shape-4 { top: 15%; right: 20%; font-size: 4rem; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .game-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 480px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 500px; /* Garante altura mínima visual */
        }

        /* Barra de progresso */
        .progress-track {
            background: #F0F3F7;
            height: 12px;
            border-radius: 10px;
            margin: 0 auto 20px auto;
            overflow: hidden;
            width: 90%;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        h1 { color: var(--secondary); font-size: 1.6rem; margin: 0 0 5px 0; }
        .subtitle { color: #b2bec3; font-size: 1rem; margin-bottom: 20px; }

        /* Área da palavra */
        .word-box {
            background: #F9F9F9;
            border: 3px dashed #DFE6E9;
            border-radius: 20px;
            padding: 20px;
            margin: 10px 0 20px 0;
            min-height: 120px; /* Altura fixa para evitar pulos */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-display {
            font-size: clamp(2rem, 8vw, 3.5rem); /* Tamanho responsivo */
            color: var(--text-color);
            font-weight: 600;
            letter-spacing: 1px;
            word-break: break-word; 
            line-height: 1.2;
        }

        /* Botões */
        .buttons-container { display: flex; gap: 15px; margin-top: 10px; }

        .btn {
            flex: 1;
            border: none;
            padding: 15px;
            border-radius: 20px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
        .btn-yes { background-color: var(--accent); }
        .btn-no { background-color: var(--wrong); }
        .btn span { font-size: 1.8rem; display: block; margin-bottom: 5px; }

        /* Feedback */
        .feedback {
            margin-top: 15px;
            font-size: 1.2rem;
            min-height: 80px; /* Reserva espaço */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none; /* Evita clique na área vazia */
            transition: opacity 0.3s;
        }
        
        .feedback.show { opacity: 1; pointer-events: auto; }
        .feedback-correct { color: var(--accent); font-weight: bold; }
        .feedback-wrong { color: var(--wrong); font-weight: bold; }
        
        .correction-text {
            font-size: 1rem;
            color: #636e72;
            margin-top: 8px;
            background: #ffeaa7;
            padding: 8px 15px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Botão Próximo */
        .next-arrow {
            background: var(--secondary);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            margin-top: 10px;
            display: none;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            align-self: center; /* Centraliza no flex container */
        }
        
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        /* Tela Final */
        #end-screen { display: none; width: 100%; }
        .final-score-badge {
            font-size: 4.5rem;
            background: var(--bg-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; /* Gradiente no texto */
            font-weight: 800;
            margin: 10px 0;
        }
        .medal { font-size: 5rem; margin-bottom: 5px; display: block; }

    </style>
</head>
<body>

    <div class="bg-shape shape-1">✏️</div>
    <div class="bg-shape shape-2">📚</div>
    <div class="bg-shape shape-3">✨</div>
    <div class="bg-shape shape-4">🅰️</div>

    <div class="game-card">
        
        <div id="game-screen">
            <h1>Certo ou Errado?</h1>
            <div class="subtitle">Leia com atenção!</div>

            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>

            <div class="word-box">
                <div class="word-display" id="word-display">...</div>
            </div>

            <div class="feedback" id="feedback-area">
                </div>

            <div class="buttons-container" id="control-buttons">
                <button class="btn btn-yes" onclick="handleAnswer(true)">
                    <span>✅</span>
                    Tá Certo!
                </button>
                <button class="btn btn-no" onclick="handleAnswer(false)">
                    <span>❌</span>
                    Tá Errado!
                </button>
            </div>

            <div style="display: flex; justify-content: center; width: 100%;">
                <button class="next-arrow" id="btn-next" onclick="nextWord()">➜</button>
            </div>
        </div>

        <div id="end-screen">
            <span class="medal">🏆</span>
            <h1>Fim do Jogo!</h1>
            <p style="color: #636e72;">Você acertou:</p>
            <div class="final-score-badge" id="final-score">0</div>
            <p id="final-message" style="color:#636e72; margin-top:0px; font-weight: 600;">Mensagem...</p>
            <br>
            <button class="btn btn-yes" onclick="restartGame()" style="width:100%; margin-top: 10px;">Jogar de Novo</button>
        </div>

    </div>

    <script>

         * Apenas erros ortográficos que "não existem" foram incluídos como false.

            // --- H Inicial ---
            { t: "Hoje", ok: true, c: "Hoje" },

            // --- E / I e O / U ---
            { t: "Cadeado", ok: true, c: "Cadeado" },
            { t: "Cadiado", ok: false, c: "Cadeado" },
            { t: "Corrimão", ok: true, c: "Corrimão" },
            { t: "Currimão", ok: false, c: "Corrimão" },

            { t: "Páteo", ok: false, c: "Pátio" },

            // --- Erros Clássicos ---
            { t: "Menas", ok: false, c: "Menos" },
            { t: "Menos", ok: true, c: "Menos" },
            { t: "Seje", ok: false, c: "Seja" },
            { t: "Seja", ok: true, c: "Seja" },

            { t: "Esteje", ok: false, c: "Esteja" },

            { t: "Mortandela", ok: false, c: "Mortadela" },

            { t: "Pobrema", ok: false, c: "Problema" },
            { t: "Mendigo", ok: true, c: "Mendigo" },
            { t: "Mendingo", ok: false, c: "Mendigo" },
            { t: "Cabeleireiro", ok: true, c: "Cabeleireiro" },
            { t: "Cabeleileiro", ok: false, c: "Cabeleireiro" },
            { t: "Asterisco", ok: true, c: "Asterisco" },
            { t: "Asterístico", ok: false, c: "Asterisco" },
            { t: "Reivindicar", ok: true, c: "Reivindicar" },
            { t: "Renvidicar", ok: false, c: "Reivindicar" },
            { t: "Beneficente", ok: true, c: "Beneficente" },
            { t: "Beneficiente", ok: false, c: "Beneficente" },
            { t: "Privilégio", ok: true, c: "Privilégio" },
            { t: "Previlégio", ok: false, c: "Privilégio" }
        ];

        // Estado do Jogo
        let gameList = [];
        let currentIndex = 0;
        let score = 0;
        const totalRounds = 10; // Total de perguntas por rodada

        // Elementos da DOM
        const els = {
            gameScreen: document.getElementById('game-screen'),
            endScreen: document.getElementById('end-screen'),
            wordDisplay: document.getElementById('word-display'),
            feedbackArea: document.getElementById('feedback-area'),
            btns: document.getElementById('control-buttons'),
            btnNext: document.getElementById('btn-next'),
            progressBar: document.getElementById('progress-bar'),
            finalScore: document.getElementById('final-score'),
            finalMsg: document.getElementById('final-message')
        };

        // Função para embaralhar array (Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            // Cria uma cópia do banco e embaralha, pegando os 10 primeiros
            gameList = shuffle([...fullDatabase]).slice(0, totalRounds);
            currentIndex = 0;
            score = 0;
            
            // UI Reset
            els.endScreen.style.display = 'none';
            els.gameScreen.style.display = 'block';
            
            loadWord();
        }

        function loadWord() {
            const item = gameList[currentIndex];
            els.wordDisplay.innerText = item.t;
            
            // Reset visual da rodada
            els.wordDisplay.style.color = 'var(--text-color)';
            els.feedbackArea.innerHTML = '';
            els.feedbackArea.classList.remove('show');
            els.btns.style.display = 'flex';
            els.btnNext.style.display = 'none';

            // Atualiza barra de progresso
            const pct = (currentIndex / totalRounds) * 100;
            els.progressBar.style.width = `${pct}%`;
        }

        function handleAnswer(userSaidYes) {
            const item = gameList[currentIndex];
            const isCorrect = (userSaidYes === item.ok);
            
            let html = '';

            if (isCorrect) {
                score++;
                html = `<span class="feedback-correct">✨ Muito bem! Acertou!</span>`;
                // Se o usuário acertou dizendo que estava errado, mostramos a correção
                if (!item.ok) {
                    html += `<div class="correction-text">O certo é: <b>${item.c}</b></div>`;
                }
            } else {
                html = `<span class="feedback-wrong">Ops! Errou...</span>`;
                html += `<div class="correction-text">`;
                
                if (item.ok) {
                    // Era Certo e usuário disse Errado
                    html += `Na verdade, <b>${item.t}</b> está correto!`;
                } else {
                    // Era Errado e usuário disse Certo
                    html += `O certo é escrever: <b>${item.c}</b>`;
                }
                html += `</div>`;
            }

            els.feedbackArea.innerHTML = html;
            els.feedbackArea.classList.add('show');
            
            els.btns.style.display = 'none';
            els.btnNext.style.display = 'block';
        }

        function nextWord() {
            currentIndex++;
            if (currentIndex < totalRounds) {
                loadWord();
            } else {
                finishGame();
            }
        }

        function finishGame() {
            els.gameScreen.style.display = 'none';
            els.endScreen.style.display = 'block';
            els.progressBar.style.width = '100%'; // Completa a barra visualmente
            
            els.finalScore.innerText = `${score}/${totalRounds}`;
            
            // Mensagens motivacionais baseadas na nota
            if (score === totalRounds) els.finalMsg.innerText = "Uau! Perfeito! Você sabe tudo! 🌟";
            else if (score >= 8) els.finalMsg.innerText = "Incrível! Mandou muito bem! 🚀";
            else if (score >= 6) els.finalMsg.innerText = "Bom trabalho! Continue treinando! 😉";
            else els.finalMsg.innerText = "Não desista! Vamos tentar de novo? 📚";
        }

        function restartGame() {
            startGame();
        }

        // Inicialização
        startGame();

    </script>
</body>
</html>
