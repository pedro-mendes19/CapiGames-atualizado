<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="jungleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43a047;stop-opacity:1" /> <!-- Vivid Jungle Green -->
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1" /> <!-- Dark Forest Green -->
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- App Icon Background: Rounded Rect -->
  <rect x="0" y="0" width="512" height="512" rx="120" ry="120" fill="url(#jungleGrad)"/>

  <!-- Dinosaur Footprint Icon -->
  <g fill="#fff" filter="url(#shadow)" transform="translate(0, 20)">
    <!-- Center Toe -->
    <path d="M256,60 C230,60 210,100 210,150 L220,280 C220,300 292,300 292,280 L302,150 C302,100 282,60 256,60 Z"/>
    
    <!-- Left Toe -->
    <path d="M140,120 C120,130 110,180 130,220 L180,300 C190,315 220,290 210,270 L170,150 C160,120 140,120 140,120 Z"/>
    
    <!-- Right Toe -->
    <path d="M372,120 C392,130 402,180 382,220 L332,300 C322,315 292,290 302,270 L342,150 C352,120 372,120 372,120 Z"/>

    <!-- Main Pad -->
    <path d="M256,320 C180,320 160,380 190,420 C220,460 292,460 322,420 C352,380 332,320 256,320 Z"/>
  </g>
</svg>
