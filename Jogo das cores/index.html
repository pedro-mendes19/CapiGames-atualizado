<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Cores - Fase 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid game-container d-flex align-items-center justify-content-center">
        
        <div class="mascot-container">
            <div class="speech-bubble" id="balao-texto">
                Olá! Eu sou a Capivara Capi! Vamos conhecer as <strong>Cores Primárias</strong>?
            </div>
            <img src="capivara.png" alt="Mascote Capivara" class="mascot-img">
        </div>

        <div class="text-center">
            <h1 class="display-3 title-fase mb-5">Cores Primárias</h1>
            
            <div class="d-flex justify-content-center gap-5 flex-wrap">
                <div class="paint-pot-wrapper" onclick="interagirCor('vermelho')">
                    <img src="pote-vermelho.png" alt="Pote Vermelho" class="paint-pot">
                    <p class="color-label label-red">VERMELHO</p>
                </div>

                <div class="paint-pot-wrapper" onclick="interagirCor('amarelo')">
                    <img src="pote-amarelo.png" alt="Pote Amarelo" class="paint-pot">
                    <p class="color-label label-yellow">AMARELO</p>
                </div>

                <div class="paint-pot-wrapper" onclick="interagirCor('azul')">
                    <img src="pote-azul.png" alt="Pote Azul" class="paint-pot">
                    <p class="color-label label-blue">AZUL</p>
                </div>
            </div>

            <button id="btn-proximo" class="btn btn-proximo mt-5 d-none" onclick="window.location.href='fase2/fase2.html'">
                Estou pronto para a Fase 2! ➡️
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
