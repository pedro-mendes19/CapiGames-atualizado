<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bella Pizza - Challenge</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --vinho: #831010;
            --madeira: #3d2b1f;
            --massa: #f3cf7a;
            --borda: #d48e38;
            --molho: #c0392b;
            --queijo: #f39c12;
            --success: #27ae60;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(#c0392b 20%, #831010 100%);
            background-color: #831010;
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.05) 75%, rgba(255,255,255,0.05)),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.05) 75%, rgba(255,255,255,0.05));
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 15px 0;
            text-shadow: 3px 3px 0px var(--madeira);
            text-align: center;
        }

        #stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
        }

        #table {
            background: #5d4037;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 100px rgba(0,0,0,0.3);
            border: 10px solid #3d2b1f;
            text-align: center;
            max-width: 850px;
            width: 95%;
            position: relative;
        }

        /* TELA DE PEDIDO (CLIENTE) */
        .character-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .character-emoji { font-size: 5rem; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4)); }
        
        .speech-bubble {
            background: #fff; color: #333; padding: 20px; border-radius: 15px;
            position: relative; max-width: 80%; margin-top: 15px; font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: left;
        }
        .speech-bubble::before {
            content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            border-width: 0 15px 15px 15px; border-style: solid; border-color: transparent transparent #fff transparent;
        }
        .speech-bubble ul { margin: 10px 0 0 0; padding-left: 20px; font-weight: bold; color: var(--vinho); }

        /* PIZZA */
        .pizza-wrapper { display: flex; justify-content: center; align-items: center; margin: 20px 0; }
        
        .pizza {
            width: 250px; height: 250px; background: var(--massa);
            border: 12px solid var(--borda); border-radius: 50%;
            position: relative; box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            overflow: hidden; transition: all 0.3s ease;
        }

        /* CAMADAS BASE */
        .layer { position: absolute; border-radius: 50%; transition: opacity 0.3s ease; }
        .layer-sauce { width: 92%; height: 92%; background: var(--molho); top: 4%; left: 4%; z-index: 1; }
        .layer-cheese { width: 86%; height: 86%; background: var(--queijo); top: 7%; left: 7%; z-index: 2; box-shadow: inset 0 0 15px #d68910; }

        /* INGREDIENTES GRÁFICOS (CSS ART) */
        .ingredient {
            position: absolute; pointer-events: none; z-index: 10;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        /* Pepperoni: Círculo vermelho escuro com pontinhos simulando a textura */
        .css-pepperoni {
            width: 38px; height: 38px; border-radius: 50%;
            background-color: #cb4335; border: 1px solid #922b21;
            background-image: radial-gradient(#922b21 15%, transparent 16%), radial-gradient(#922b21 15%, transparent 16%);
            background-size: 12px 12px; background-position: 0 0, 6px 6px;
        }

        /* Cebola: Anéis brancos/roxos vazados */
        .css-onion {
            width: 40px; height: 40px; border-radius: 50%;
            border: 4px solid #f4ecf7; box-shadow: inset 0 0 2px #9b59b6, 0 0 2px #9b59b6;
            background: transparent;
        }

        /* Azeitona: Círculos pretos vazados */
        .css-olive {
            width: 18px; height: 18px; border-radius: 50%;
            border: 5px solid #1c2833; background: transparent;
        }

        /* Manjericão: Formato de folha usando border-radius assimétrico */
        .css-basil {
            width: 25px; height: 25px; background: #229a54;
            border-radius: 50% 0 50% 0; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
            border: 1px solid #145a32;
        }

        /* Milho: Pequenas pílulas amarelas */
        .css-corn {
            width: 14px; height: 16px; background: #f1c40f;
            border-radius: 40%; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
            border: 1px solid #d4ac0d;
        }

        /* BOTÕES E MENUS */
        .btn-italy {
            background: var(--success); color: white; border: none; padding: 12px 25px;
            border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            box-shadow: 0 5px 0 #1e8449; transition: all 0.1s;
        }
        .btn-italy:active { transform: translateY(4px); box-shadow: 0 1px 0 #1e8449; }

        .ingredients-menu { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        
        .ing-selector {
            background: #fdf2e9; color: var(--madeira); border: 2px solid var(--madeira);
            padding: 8px 15px; border-radius: 50px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 8px; transition: transform 0.1s;
        }
        .ing-selector:active { transform: scale(0.95); }

        /* Ícones em miniatura para os botões */
        .mini-icon { position: relative; display: inline-block; filter: none; transform: scale(0.6); transform-origin: center; margin: -10px; }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .paper-modal {
            background: #fff; color: #333; padding: 30px; border-radius: 5px; text-align: center;
            background-image: radial-gradient(#ddd 10%, transparent 10%); background-size: 15px 15px; max-width: 400px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<h1>La Bella Pizza</h1>

<div id="stats-bar">
    <span>Nível: <span id="level-val">1</span></span>
    <span>Pedidos Entregues: <span id="score-val">0</span></span>
</div>

<div id="table">
    <div id="screen-start">
        <h2 style="font-family: 'Playfair Display'">O balcão está aberto!</h2>
        <p>Atenda os clientes e monte as pizzas exatamente como eles pedirem.</p>
        <button class="btn-italy" onclick="nextOrder()">Receber Primeiro Cliente</button>
    </div>

    <div id="screen-order" class="hidden">
        <div class="character-container">
            <div class="character-emoji" id="customer-emoji">🧔‍♂️</div>
            <div class="speech-bubble">
                <span id="order-greeting"></span>
                <ul id="order-list"></ul>
            </div>
        </div>
        <button class="btn-italy" onclick="startCooking()">Ir para a Cozinha</button>
    </div>

    <div id="screen-cook" class="hidden">
        <div class="pizza-wrapper">
            <div id="player-pizza" class="pizza"></div>
        </div>
        
        <h4 style="margin-bottom: 10px;">Ingredientes:</h4>
        <div id="ingredients-list" class="ingredients-menu"></div>
        
        <button class="btn-italy" style="width:100%; margin-top: 15px;" onclick="checkAnswer()">Entregar Pizza</button>
        <button onclick="clearPizza()" style="background:none; border:none; color:#fdf2e9; cursor:pointer; margin-top:15px; text-decoration:underline;">
            Jogar Massa Fora (Recomeçar)
        </button>
    </div>
</div>

<div id="modal-overlay">
    <div class="paper-modal">
        <h2 id="res-title"></h2>
        <p id="res-text"></p>
        <button id="modal-btn" class="btn-italy" onclick="handleModalBtn()">Próximo Pedido</button>
    </div>
</div>

<script>
    let level = 1;
    let score = 0;
    let targetRecipe = {};
    let currentRecipe = {};
    let currentAvailableIngredients = [];

    const customers = ['🧔‍♂️', '👩‍🦰', '👴', '👱‍♀️', '👲', '🧔‍♀️'];

    // Banco de Ingredientes Atualizado (Trocamos Emojis por Classes CSS)
    const allIngredients = [
        { id: 'sauce', name: 'Molho', type: 'base', iconEmoji: '🍅' },
        { id: 'cheese', name: 'Queijo', type: 'base', iconEmoji: '🧀' },
        { id: 'pepperoni', name: 'Pepperoni', type: 'topping', cssClass: 'css-pepperoni' },
        { id: 'onion', name: 'Cebola', type: 'topping', cssClass: 'css-onion' },
        { id: 'olive', name: 'Azeitona', type: 'topping', cssClass: 'css-olive' },
        { id: 'basil', name: 'Manjericão', type: 'topping', cssClass: 'css-basil' },
        { id: 'corn', name: 'Milho', type: 'topping', cssClass: 'css-corn' }
    ];

    // ATUALIZA A LISTA DE INGREDIENTES DISPONÍVEIS BASEADO NO NÍVEL
    function updateAvailableIngredients() {
        // Começa com Molho, Queijo, e Pepperoni. A cada 2 níveis, adiciona um novo.
        let itemsToShow = Math.min(3 + Math.floor((level - 1) / 2), allIngredients.length);
        currentAvailableIngredients = allIngredients.slice(0, itemsToShow);
    }

    function nextOrder() {
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-cook').classList.add('hidden');
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('screen-order').classList.remove('hidden');

        updateAvailableIngredients();
        generateOrder();
    }

    function generateOrder() {
        targetRecipe = {};
        const orderListElement = document.getElementById('order-list');
        orderListElement.innerHTML = '';

        document.getElementById('customer-emoji').innerText = customers[Math.floor(Math.random() * customers.length)];
        document.getElementById('order-greeting').innerText = "Mamma mia! Eu quero uma pizza com:";

        targetRecipe['sauce'] = 1;
        targetRecipe['cheese'] = 1;
        
        let liSauce = document.createElement('li');
        liSauce.innerText = `1x Camada de Molho`;
        orderListElement.appendChild(liSauce);

        let liCheese = document.createElement('li');
        liCheese.innerText = `1x Camada de Queijo`;
        orderListElement.appendChild(liCheese);

        // O cliente SÓ PODE ESCOLHER ingredientes que estão na variável "currentAvailableIngredients"
        let availableToppings = currentAvailableIngredients.filter(i => i.type === 'topping');
        availableToppings.sort(() => 0.5 - Math.random());

        // Quantidade de tipos diferentes que o cliente vai pedir na mesma pizza
        let numToppingsTypes = Math.min(1 + Math.floor(level / 3), availableToppings.length);
        if (numToppingsTypes === 0) numToppingsTypes = 1;

        for(let i = 0; i < numToppingsTypes; i++) {
            let count = Math.floor(Math.random() * 3) + 1 + Math.floor(level / 4);
            let topping = availableToppings[i];
            
            targetRecipe[topping.id] = count;

            let li = document.createElement('li');
            li.innerText = `${count}x Fatias de ${topping.name}`;
            orderListElement.appendChild(li);
        }
    }

    function startCooking() {
        document.getElementById('screen-order').classList.add('hidden');
        document.getElementById('screen-cook').classList.remove('hidden');
        
        clearPizza();
        setupMenu();
    }

    function setupMenu() {
        const menu = document.getElementById('ingredients-list');
        menu.innerHTML = '';

        // O menu usa EXATAMENTE a mesma lista do cliente
        currentAvailableIngredients.forEach(ing => {
            const btn = document.createElement('button');
            btn.className = 'ing-selector';
            
            // Renderiza o ícone CSS dentro do botão ou o emoji (se for base)
            let iconHtml = ing.type === 'base' ? ing.iconEmoji : `<div class="mini-icon ${ing.cssClass}"></div>`;
            btn.innerHTML = `${iconHtml} ${ing.name}`;
            
            btn.onclick = () => addPlayerIng(ing.id);
            menu.appendChild(btn);
        });
    }

    function addPlayerIng(ingId) {
        let ingData = allIngredients.find(i => i.id === ingId);
        currentRecipe[ingId] = (currentRecipe[ingId] || 0) + 1;
        let pizza = document.getElementById('player-pizza');

        if (ingData.type === 'base') {
            if (!document.getElementById(`layer-${ingId}`)) {
                let layer = document.createElement('div');
                layer.id = `layer-${ingId}`;
                layer.className = `layer layer-${ingId}`;
                pizza.appendChild(layer);
            }
        } else {
            // Desenha os Toppings gráficos na pizza
            let div = document.createElement('div');
            div.className = `ingredient ${ingData.cssClass}`;
            
            // Espalha pelo círculo
            div.style.top = (Math.random() * 66 + 12) + '%';
            div.style.left = (Math.random() * 66 + 12) + '%';
            div.style.transform = `rotate(${Math.random() * 360}deg)`;
            pizza.appendChild(div);
        }
    }

    function clearPizza() {
        document.getElementById('player-pizza').innerHTML = '';
        currentRecipe = {};
    }

    function checkAnswer() {
        let win = true;
        let errorMessage = "";

        for (let key in targetRecipe) {
            let pCount = currentRecipe[key] || 0;
            if (targetRecipe[key] !== pCount) {
                win = false;
                let ingName = allIngredients.find(i => i.id === key).name;
                errorMessage = pCount < targetRecipe[key] 
                    ? `Faltou ${ingName}! O cliente queria ${targetRecipe[key]}, você colocou ${pCount}.` 
                    : `Muito ${ingName}! O cliente queria ${targetRecipe[key]}, você colocou ${pCount}.`;
                break;
            }
        }

        if (win) {
            for (let key in currentRecipe) {
                if ((currentRecipe[key] > 0) && !targetRecipe[key]) {
                    win = false;
                    let ingName = allIngredients.find(i => i.id === key).name;
                    errorMessage = `O cliente não pediu ${ingName}!`;
                    break;
                }
            }
        }

        const modal = document.getElementById('modal-overlay');
        modal.style.display = 'flex';

        if (win) {
            score++;
            level++;
            document.getElementById('res-title').innerText = '⭐ Perfetto! ⭐';
            document.getElementById('res-text').innerText = `A pizza ficou idêntica ao pedido. O cliente amou!`;
        } else {
            score = 0;
            level = 1; 
            document.getElementById('res-title').innerText = '🚫 Pizza Devolvida! 🚫';
            document.getElementById('res-text').innerText = errorMessage;
        }

        document.getElementById('score-val').innerText = score;
        document.getElementById('level-val').innerText = level;
    }

    function handleModalBtn() {
        nextOrder();
    }
</script>

</body>
</html>
