<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bella Pizza - Challenge</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

 <!-- FAVICONS CORRETOS (BASEADO NA SUA PASTA IMG) -->

<link rel="icon" type="image/png" sizes="16x16" href="img/logo-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/logo-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="img/logo-192.png">

<link rel="apple-touch-icon" href="img/apple-touch-icon.png">

<link rel="icon" href="img/logo.ico">

    <style>
        :root {
            --vinho: #831010;
            --madeira: #3d2b1f;
            --massa: #f3cf7a;
            --borda: #d48e38;
            --success: #27ae60;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(#c0392b 20%, #831010 100%);
            background-color: #831010;
            background-image:
                repeating-linear-gradient(
                    45deg,
                    rgba(255,255,255,0.05) 25%,
                    transparent 25%,
                    transparent 75%,
                    rgba(255,255,255,0.05) 75%,
                    rgba(255,255,255,0.05)
                ),
                repeating-linear-gradient(
                    45deg,
                    rgba(255,255,255,0.05) 25%,
                    transparent 25%,
                    transparent 75%,
                    rgba(255,255,255,0.05) 75%,
                    rgba(255,255,255,0.05)
                );
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 15px 0;
            text-shadow: 3px 3px 0px var(--madeira);
        }

        #stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
        }

        #table {
            background: #5d4037;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 100px rgba(0,0,0,0.3);
            border: 10px solid #3d2b1f;
            text-align: center;
            max-width: 850px;
            width: 95%;
            position: relative;
        }

        .pizza-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .pizza {
            width: 160px;
            height: 160px;
            background: var(--massa);
            border: 10px solid var(--borda);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .pizza-large {
            width: 220px;
            height: 220px;
        }

        .ingredient {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        .btn-italy {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 #1e8449;
            transition: all 0.1s;
        }

        .btn-italy:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1e8449;
        }

        .ingredients-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .ing-selector {
            background: #fdf2e9;
            color: var(--madeira);
            border: 2px solid var(--madeira);
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .paper-modal {
            background: #fff;
            color: #333;
            padding: 30px;
            border-radius: 5px;
            text-align: center;
            background-image: radial-gradient(#ddd 10%, transparent 10%);
            background-size: 15px 15px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<h1>La Bella Pizza</h1>

<div id="stats-bar">
    <span>Nível: <span id="level-val">1</span></span>
    <span>Pedidos Entregues: <span id="score-val">0</span></span>
</div>

<div id="table">
    <div id="screen-start">
        <h2 style="font-family: 'Playfair Display'">O balcão está aberto!</h2>
        <p>Combine os ingredientes das pizzas que aparecerem.</p>
        <button class="btn-italy" onclick="nextLevel()">Aceitar Primeiro Pedido</button>
    </div>

    <div id="screen-memorize" class="hidden">
        <div id="preview-container" class="pizza-wrapper"></div>
        <h3 id="memo-timer" style="color: #f1c40f;">Memorize rápido!</h3>
    </div>

    <div id="screen-cook" class="hidden">
        <div class="pizza-wrapper">
            <div id="player-pizza" class="pizza pizza-large"></div>
        </div>
        <div id="ingredients-list" class="ingredients-menu"></div>
        <button class="btn-italy" style="width:100%;" onclick="checkAnswer()">Finalizar Pizza</button>
        <button onclick="clearPizza()" style="background:none;border:none;color:#fdf2e9;cursor:pointer;margin-top:10px;text-decoration:underline;">
            Limpar Massa
        </button>
    </div>
</div>

<div id="modal-overlay">
    <div class="paper-modal">
        <h2 id="res-title"></h2>
        <p id="res-text"></p>
        <button id="modal-btn" class="btn-italy" onclick="handleModalBtn()">Próximo Pedido</button>
    </div>
</div>

<script>
    let level = 1;
    let score = 0;
    let targetTotal = 0;
    let currentTotal = 0;

    const allIngredients = [
        { emoji: '🔴', name: 'Pepperoni' },
        { emoji: '⚫', name: 'Azeitona' },
        { emoji: '🌿', name: 'Manjericão' },
        { emoji: '🌽', name: 'Milho' }
    ];

    function nextLevel() {
        currentTotal = 0;
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-cook').classList.add('hidden');
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('screen-memorize').classList.remove('hidden');

        const numPizzas = level > 5 ? 3 : 2;
        const maxIngPerPizza = 2 + Math.floor(level / 2);
        const memoTime = Math.max(2000, 5000 - (level * 300));

        setupMemorization(numPizzas, maxIngPerPizza);

        setTimeout(() => {
            document.getElementById('screen-memorize').classList.add('hidden');
            setupCooking();
        }, memoTime);
    }

    function setupMemorization(numPizzas, maxIng) {
        const container = document.getElementById('preview-container');
        container.innerHTML = '';
        targetTotal = 0;

        for (let i = 0; i < numPizzas; i++) {
            const count = Math.floor(Math.random() * maxIng) + 1;
            const ing = allIngredients[i % Math.min(level, allIngredients.length)];
            targetTotal += count;

            const wrapper = document.createElement('div');
            const pDiv = document.createElement('div');
            pDiv.className = 'pizza';
            pDiv.id = 'p-preview-' + i;

            wrapper.appendChild(pDiv);

            const label = document.createElement('p');
            label.innerText = ing.name;
            wrapper.appendChild(label);

            container.appendChild(wrapper);

            if (i < numPizzas - 1) {
                const plus = document.createElement('span');
                plus.innerText = '+';
                plus.style.fontSize = '2rem';
                container.appendChild(plus);
            }

            drawIng(pDiv.id, count, ing.emoji);
        }
    }

    function drawIng(id, num, emoji) {
        const el = document.getElementById(id);
        for (let i = 0; i < num; i++) {
            const span = document.createElement('span');
            span.className = 'ingredient';
            span.innerText = emoji;
            span.style.top = (Math.random() * 60 + 20) + '%';
            span.style.left = (Math.random() * 60 + 20) + '%';
            span.style.transform = `rotate(${Math.random() * 360}deg)`;
            el.appendChild(span);
        }
    }

    function setupCooking() {
        document.getElementById('screen-cook').classList.remove('hidden');
        document.getElementById('player-pizza').innerHTML = '';

        const menu = document.getElementById('ingredients-list');
        menu.innerHTML = '';

        const available = allIngredients.slice(0, Math.min(level, allIngredients.length));
        available.forEach(ing => {
            const btn = document.createElement('button');
            btn.className = 'ing-selector';
            btn.innerHTML = `${ing.emoji} ${ing.name}`;
            btn.onclick = () => addPlayerIng(ing.emoji);
            menu.appendChild(btn);
        });
    }

    function addPlayerIng(emoji) {
        drawIng('player-pizza', 1, emoji);
        currentTotal++;
    }

    function clearPizza() {
        document.getElementById('player-pizza').innerHTML = '';
        currentTotal = 0;
    }

    function checkAnswer() {
        const win = currentTotal === targetTotal;
        const modal = document.getElementById('modal-overlay');
        modal.style.display = 'flex';

        if (win) {
            score++;
            level++;
            document.getElementById('res-title').innerText = '⭐ Mamma Mia! ⭐';
            document.getElementById('res-text').innerText = `Acertou em cheio os ${targetTotal} ingredientes!`;
        } else {
            score = 0;
            level = 1;
            document.getElementById('res-title').innerText = '🚫 Pizza Devolvida! 🚫';
            document.getElementById('res-text').innerText = `O cliente queria ${targetTotal}, você colocou ${currentTotal}.`;
        }

        document.getElementById('score-val').innerText = score;
        document.getElementById('level-val').innerText = level;
    }

    function handleModalBtn() {
        nextLevel();
    }
</script>

</body>
</html>
