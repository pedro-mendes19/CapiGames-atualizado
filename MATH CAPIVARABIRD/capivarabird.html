<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH FLAPPY CAPIVARA   v</title>
    <style>
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Verdana', sans-serif;
            overflow: hidden;
        }

        canvas {
            border: 4px solid #000;
            display: block;
            background-color: #70c5ce;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
    <link rel="icon" type="image/text" href="img/capivaravoando.png">
</head>
<body>

    <canvas id="canvas" width="800" height="450"></canvas>

    <script>
        const cvs = document.getElementById("canvas");
        const ctx = cvs.getContext("2d");

        let frames = 0;

        // IMAGEM DA CAPIVARA
        const capybaraSprite = new Image();
        capybaraSprite.src = "img/capivaravoando.png"; 

        // ESTADO DO JOGO
        const state = {
            current: 0,
            getReady: 0,
            game: 1,
            over: 2
        }

        // --- NOVOS CONTROLES ---
        function resetGame() {
            gates.reset();
            bird.positionReset();
            score.reset();
            state.current = state.getReady;
        }

        // Controle por Teclado
        document.addEventListener("keydown", function(evt) {
            if(state.current === state.getReady) {
                state.current = state.game;
            } else if(state.current === state.game) {
                if(evt.code === "ArrowUp" || evt.code === "KeyW") {
                    bird.targetY = 90; // Vai para a faixa de cima
                } else if (evt.code === "ArrowDown" || evt.code === "KeyS") {
                    bird.targetY = 320; // Vai para a faixa de baixo
                }
            } else if(state.current === state.over) {
                if(evt.code === "Space" || evt.code === "ArrowUp" || evt.code === "ArrowDown") {
                    resetGame();
                }
            }
        });

        // Controle por Mouse/Toque
        cvs.addEventListener("click", function(evt) {
            const rect = cvs.getBoundingClientRect();
            // Calcula onde o usuário clicou relativo ao canvas
            const clickY = (evt.clientY - rect.top) * (cvs.height / rect.height);

            if(state.current === state.getReady) {
                state.current = state.game;
            } else if(state.current === state.game) {
                // Se clicar na metade superior, sobe. Se não, desce.
                if(clickY < cvs.height / 2) {
                    bird.targetY = 90;
                } else {
                    bird.targetY = 320;
                }
            } else if(state.current === state.over) {
                resetGame();
            }
        });

        // OBJETOS DO JOGO
        const bird = {
            x: 100, 
            y: 205, // Inicia no meio
            targetY: 205, // Y desejado (para movimento suave)
            w: 60, 
            h: 45, 
            draw: function() {
                if (capybaraSprite.complete && capybaraSprite.naturalHeight !== 0) {
                    ctx.drawImage(capybaraSprite, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = "#8B4513";
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
            },
            update: function() {
                if(state.current !== state.game) return;
                
                // MUDANÇA: Movimento suave até a faixa escolhida (interpolação)
                this.y += (this.targetY - this.y) * 0.15;
                
                // Limites de teto e chão por segurança
                if(this.y + this.h >= cvs.height - fg.h) {
                    this.y = cvs.height - fg.h - this.h;
                }
                if(this.y < 0) this.y = 0;
            },
            positionReset: function() { 
                this.y = 205; 
                this.targetY = 205; 
            }
        }

        const fg = {
            h: 50, 
            draw: function() {
                ctx.fillStyle = "#ded895";
                ctx.fillRect(0, cvs.height - this.h, cvs.width, this.h);
                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(0, cvs.height - this.h, cvs.width, 15);
            }
        }

        // --- SISTEMA DE MATEMÁTICA ---
        const mathSystem = {
            currentQuestion: "Prepare-se",
            
            generate: function() {
                const operacao = Math.random() < 0.5 ? '+' : '-';
                let a = Math.floor(Math.random() * 10);
                let b = Math.floor(Math.random() * 10);
                let res = 0;

                if(operacao === '-') {
                    if(a < b) { let temp = a; a = b; b = temp; }
                    res = a - b;
                } else {
                    res = a + b;
                }

                let wrong = res + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
                if(wrong < 0) wrong = res + 2; 

                return {
                    text: `${a} ${operacao} ${b}`,
                    correct: res,
                    wrong: wrong
                };
            }
        }

        // PORTÕES DE DECISÃO
        const gates = {
            position: [],
            w: 50,
            dx: 3, 
            
            draw: function() {
                for(let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    
                    // Desenha o obstáculo central
                    ctx.fillStyle = "green";
                    ctx.fillRect(p.x, p.centerY - 50, this.w, 100); 
                    ctx.strokeStyle = "black";
                    ctx.strokeRect(p.x, p.centerY - 50, this.w, 100);

                    // Configuração do texto das respostas
                    ctx.fillStyle = "#FFF";
                    ctx.font = "bold 30px Arial";
                    ctx.strokeStyle = "black";
                    ctx.lineWidth = 3;
                    ctx.textAlign = "left"; 

                    let topText = p.isTopCorrect ? p.problem.correct : p.problem.wrong;
                    ctx.strokeText(topText, p.x + 10, p.centerY - 80);
                    ctx.fillText(topText, p.x + 10, p.centerY - 80);

                    let bottomText = p.isTopCorrect ? p.problem.wrong : p.problem.correct;
                    ctx.strokeText(bottomText, p.x + 10, p.centerY + 80);
                    ctx.fillText(bottomText, p.x + 10, p.centerY + 80);
                }
            },
            
            update: function() {
                if(state.current !== state.game) return;
                
                if(frames % 200 === 0) {
                    const problem = mathSystem.generate();
                    mathSystem.currentQuestion = problem.text + " = ?";
                    
                    this.position.push({
                        x: cvs.width,
                        centerY: cvs.height / 2 - 20, 
                        problem: problem,
                        isTopCorrect: Math.random() < 0.5, 
                        passed: false
                    });
                }
                
                for(let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    p.x -= this.dx;

                    let blockTop = p.centerY - 50;
                    let blockBottom = p.centerY + 50;

                    // Colisão com o bloco do meio
                    if(bird.x + bird.w > p.x && bird.x < p.x + this.w) {
                        if(bird.y + bird.h > blockTop && bird.y < blockBottom) {
                            state.current = state.over;
                        }
                    }

                    // Passou pelo bloco (Sistema de Pontuação)
                    if(p.x + this.w < bird.x && !p.passed) {
                        p.passed = true;
                        
                        let choseTop = bird.y < p.centerY;
                        
                        if((choseTop && p.isTopCorrect) || (!choseTop && !p.isTopCorrect)) {
                            score.value += 1;
                            score.best = Math.max(score.value, score.best);
                        } else {
                            state.current = state.over; 
                        }
                    }

                    // Remove canos que saíram da tela
                    if(p.x + this.w <= 0) {
                        this.position.shift();
                        i--;
                    }
                }
            },
            reset: function() {
                this.position = [];
                mathSystem.currentQuestion = "Prepare-se";
            }
        }

        const score = {
            best: 0,
            value: 0,
            draw: function() {
                ctx.fillStyle = "#FFF";
                ctx.strokeStyle = "#000";
                
                if(state.current === state.game) {
                    ctx.font = "35px Arial";
                    ctx.textAlign = "right"; 
                    ctx.fillText(this.value, cvs.width - 20, 50);
                    
                    ctx.textAlign = "center";
                    ctx.fillStyle = "#FFD700"; 
                    ctx.font = "bold 50px Arial"; 
                    ctx.lineWidth = 4;
                    ctx.strokeText(mathSystem.currentQuestion, cvs.width / 2, 80);
                    ctx.fillText(mathSystem.currentQuestion, cvs.width / 2, 80);

                } else if(state.current === state.over) {
                    ctx.textAlign = "center"; 
                    ctx.fillStyle = "#FFF";
                    ctx.font = "30px Arial";
                    ctx.fillText("Pontos: " + this.value, cvs.width / 2, 180);
                    ctx.fillText("Melhor: " + this.best, cvs.width / 2, 220);
                    
                    ctx.font = "bold 40px Arial";
                    ctx.fillText("Errou a conta!", cvs.width / 2, 120);
                    
                    ctx.font = "30px Arial";
                    ctx.fillText("Clique ou use as Setas p/ tentar de novo", cvs.width / 2, 320);

                } else if (state.current === state.getReady) {
                    ctx.textAlign = "center"; 

                    ctx.fillStyle = "#FFF";
                    ctx.font = "bold 50px Arial";
                    ctx.strokeText("Math Capy", cvs.width / 2, 140);
                    ctx.fillText("Math Capy", cvs.width / 2, 140);
                    
                    ctx.font = "22px Arial";
                    ctx.fillText("Use as SETAS (Cima/Baixo) ou CLIQUE na", cvs.width / 2, 240);
                    ctx.fillText("metade superior ou inferior da tela", cvs.width / 2, 275);
                    ctx.fillText("para voar até a resposta certa!", cvs.width / 2, 310);
                }
                
                ctx.textAlign = "left"; 
            },
            reset: function() { this.value = 0; }
        }

        function draw() {
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            gates.draw();
            fg.draw();
            bird.draw();
            score.draw();
        }

        function update() {
            bird.update();
            gates.update();
        }

        function loop() {
            update();
            draw();
            frames++;
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
