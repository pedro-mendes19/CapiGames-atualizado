<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Monte o Cristo Redentor 3D</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #87ceeb;
  }

  #ui {
    position: fixed;
    top: 10px;
    width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    color: #000;
  }

  #info {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.9);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 10;
    pointer-events: none;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
    display: block;
  }
</style>
</head>

<body>

<div id="ui">
  <h1>🗿 Monte o Cristo Redentor</h1>
  <p>Arraste as peças para o lugar correto</p>
</div>

<div id="info">
  🖱️ Clique e arraste as peças<br>
  🔄 Use o mouse para girar a câmera
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfdfff);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 6, 14);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= CONTROLS =================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dir = new THREE.DirectionalLight(0xffffff, 0.6);
dir.position.set(5, 10, 5);
scene.add(dir);

// ================= GROUND =================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50, 50),
  new THREE.MeshStandardMaterial({ color: 0xdddddd })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ================= MATERIAL =================
const material = new THREE.MeshStandardMaterial({ color: 0xcccccc });

// ================= TARGETS =================
const targets = {
  body: new THREE.Vector3(0, 3, 0),
  head: new THREE.Vector3(0, 5.6, 0),
  armL: new THREE.Vector3(-4, 4.8, 0),
  armR: new THREE.Vector3(4, 4.8, 0)
};

// ================= PIECES =================
const pieces = [];

function piece(name, geo, start, target) {
  const m = new THREE.Mesh(geo, material);
  m.position.copy(start);
  m.userData = { target, placed: false };
  scene.add(m);
  pieces.push(m);
}

piece("body", new THREE.BoxGeometry(2.5,5,1.2), new THREE.Vector3(-8,2.5,0), targets.body);
piece("head", new THREE.BoxGeometry(1.4,1.4,1.4), new THREE.Vector3(8,1.4,0), targets.head);
piece("armL", new THREE.BoxGeometry(5,0.7,0.7), new THREE.Vector3(-8,6,0), targets.armL);
piece("armR", new THREE.BoxGeometry(5,0.7,0.7), new THREE.Vector3(8,6,0), targets.armR);

// ================= RAYCAST =================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selected = null;

window.addEventListener("mousedown", e => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObjects(pieces);
  if (hit.length) {
    selected = hit[0].object;
    controls.enabled = false;
  }
});

window.addEventListener("mousemove", e => {
  if (!selected || selected.userData.placed) return;
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const pos = raycaster.ray.at(10, new THREE.Vector3());
  selected.position.x = pos.x;
  selected.position.z = pos.z;
});

window.addEventListener("mouseup", () => {
  if (!selected) return;
  if (selected.position.distanceTo(selected.userData.target) < 1) {
    selected.position.copy(selected.userData.target);
    selected.userData.placed = true;
  }
  selected = null;
  controls.enabled = true;
});

// ================= ANIMATE =================
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
