<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Que Alimento é Esse?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      text-transform: uppercase;
    }

    #intro-screen {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #cfeec0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .capa-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 1920px;
      overflow: hidden;
    }

    .img-capa-fundo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .conteudo-central {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .img-capa-frente {
      width: auto;
      height: auto;
      max-width: 90%;
      max-height: 67vh;
      object-fit: contain;
      margin-bottom: 20px;
      animation: flutuarImagem 3s infinite ease-in-out;
    }
    
    @keyframes flutuarImagem {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    @keyframes pulsarBotao {
      0% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
      50% { transform: scale(1.1); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
      100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
    }

    .btn-jogar-capa {
      background: linear-gradient(to bottom, #76bd4e, #518639);
      color: white;
      font-size: clamp(20px, 6vw, 30px);
      font-weight: 960;
      padding: 22px 80px;      
      border: 4px solid #fff;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: auto;
      animation: pulsarBotao 1.2s infinite ease-in-out;
      transition: background 0.3s;
    }

    .btn-jogar-capa:hover {
      background: linear-gradient(to bottom, #7baf51, #5d853d);
    }

    #game-screen {
      display: none; 
      flex-direction: column; 
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      height: 100vh;
      background: linear-gradient(180deg, #e0f7fa 0%, #a5d6a7 100%);
      overflow-y: auto;
      padding-top: 10px;
    }

    .logo-game {
      display: block;
      margin: 0 auto 20px auto;
      margin-top: 15px;
      max-width: 90%;
      height: auto;
      max-height: 120px;
      object-fit: contain;
      filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.2));
      flex-shrink: 0; 
    }

    .cartao-jogo {
      background-color: #ffffffb0;
      border-radius: 30px;
      padding: 20px 15px; 
      width: 90%;
      max-width: 800px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
      border: 3px dashed #6398B6; 
      position: relative;
      margin-bottom: 50px;
      box-sizing: border-box;
    }

    #painel-quiz {
        display: none;
        flex-direction: column;
        justify-content: center;
    }

    #painel-final {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 300px; 
        margin-top: 30px;
        padding: 6vh 4vw;        
    }

    .dica-container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: #f5fbff;
      border: 3px solid #6398B6; 
      border-radius: 30px;
      padding: 20px;
      position: relative;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }

    /* O novo cabeçalho que alinha tudo (Som - Contador - Mudo) */
    .cabecalho-dica {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    /* Estilo do contador (sem margem embaixo porque o cabeçalho já resolve isso) */
    .contador-perguntas {
      font-size: 16px;
      font-weight: 900;
      color: #0288d1;
      background: #e1f5fe;
      border: 2px solid #4FC3F7;
      border-radius: 20px;
      padding: 5px 15px;
      display: inline-block;
      margin-bottom: 0; 
      letter-spacing: 1px;
    }

    /* Voltamos a dica para o centro agora que os botões subiram */
    #dica {
      font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #5d4037;
      line-height: 1.3;
      margin-top: 0; 
      text-align: center; 
    }

    /* O estilo dos botões continua o mesmo, apenas garantindo que não fiquem gigantes */
    .btn-som, .btn-mudo {
      background: #ffe0b2;
      border: none;
      border-radius: 50px;
      padding: 8px 15px;
      font-size: 18px;
      font-weight: bold;
      color: #e65100;
      cursor: pointer;
      box-shadow: 0 4px 0 #ffb74d;
      transition: all 0.1s;
    }
    
    .btn-mudo { 
      background: #ffcdd2; 
      color: #c62828; 
      box-shadow: 0 4px 0 #ef9a9a; 
    }
    
    .btn-som:active { transform: translateY(4px); box-shadow: 0 0 0 #ffb74d; }
    .btn-mudo:active { transform: translateY(4px); box-shadow: 0 0 0 #ef9a9a; }

    .opcoes {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 30px;
      padding: 0 10px;
    }

    .opcao {
      background: #f5fff6;
      border: 3px solid #2e7d32;
      border-radius: 25px;
      box-shadow: 0 5px 0 #2e7d32; 
      padding: 15px 10px;
      width: 150px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 900;
      color: #2e7d32;
      transition: all 0.1s;
      margin-bottom: 10px;
    }
    
    .opcao:hover { 
      background-color: #e8f5e9; 
      transform: translateY(-2px);
    }
    
    .opcao:active { 
      transform: translateY(6px);
      box-shadow: 0 0 0 #2e7d32; 
    }

    #area-resultado {
      margin-top: 20px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #img-resposta {
      display: none;
      width: 180px;
      height: 180px;
      object-fit: contain;
      border-radius: 20px;
      border: 5px solid #fff;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      margin-bottom: 15px;
      background-color: white;
      transform: scale(1); 
    }
    
    @keyframes pop { 
        0% { transform: scale(0); opacity: 0; } 
        80% { transform: scale(1.1); opacity: 1; } 
        100% { transform: scale(1); } 
    }
    
    .animar-pop { animation: pop 0.4s ease-out; }
    
    #texto-resultado { 
        font-size: 26px; 
        font-weight: 900; 
        text-shadow: 2px 2px 0 #fff;
        padding: 0 20px;
    }

    .btn-proxima {
      margin: 20px auto;
      display: inline-block;
      padding: 15px 60px;
      font-size: 24px;
      border: none;
      border-radius: 60px;
      background: linear-gradient(to bottom, #ff9c08, #ff860c);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 0 #e65100, 0 15px 20px rgba(0,0,0,0.2);
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-proxima:hover { 
        background: linear-gradient(to bottom, #ec9513, #f57c00); 
        transform: translateY(-2px);
    }
    
    .btn-proxima:active {
        transform: translateY(8px);
        box-shadow: 0 0 0 #e65100;
    }

    .btn-proxima:disabled {
        background: #cccccc;
        color: #777777;
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
        pointer-events: none;
    }

    #mensagem-final {
      font-size: 30px;
      color: #2e7d32;
      font-weight: 900;
      margin-bottom: 30px;
      padding: 0 10px;
    }

    .resumo-placar {
      font-size: 24px;
      color: #555;
      margin-bottom: 40px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .resumo-item {
      display: inline-block;
      padding: 15px 30px;
      border-radius: 20px;
      color: white;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    
    .bg-verde { background: #66bb6a; border: 2px solid #2e7d32; }
    .bg-vermelho { background: #ef5350; border: 2px solid #c62828; }

    .botoes-finais {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3vh;
    }

    /* 1. Estrutura e tamanho IGUAIS para os dois botões */
    .btn-reiniciar, .btn-sair {
      margin: 10px auto;
      display: inline-block;
      padding: 18px 22px; 
      font-size: 18px; 
      border: none;
      border-radius: 60px;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: auto; 
      min-width: 300px; 
      box-sizing: border-box;
    }

    /* 2. Cores exclusivas do botão REINICIAR */
    .btn-reiniciar {
      background: linear-gradient(to bottom, #4FC3F7, #039BE5);
      box-shadow: 0 8px 0 #0280bf, 0 15px 20px rgba(0,0,0,0.2);
    }

    .btn-reiniciar:hover {
      background: linear-gradient(to bottom, #29b6f6, #0288d1);
      transform: translateY(-2px);
    }

    .btn-reiniciar:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 #0280bf;
    }

    /* 3. Cores exclusivas do botão SAIR */
    .btn-sair {
      background: linear-gradient(to bottom, #ffb74d, #f57c00);
      box-shadow: 0 8px 0 #c76500, 0 15px 20px rgba(0,0,0,0.2);
    }

    .btn-sair:hover {
      background: linear-gradient(to bottom, #ffa726, #ef6c00);
      transform: translateY(-2px);
    }

    .btn-sair:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 #c76500;
    }

    @media (max-width: 768px) {
      /* --- Ajustes para Celulares --- */
      .img-capa-frente {
        max-width: 120%; 
        max-height: 75vh; 
        margin-bottom: 10px; 
      }
      
      .btn-jogar-capa { padding: 15px 50px; }
      .cartao-jogo { width: 95%; padding: 20px 15px; }
      .logo-game { max-height: 90px; }
      #img-resposta { width: 130px; height: 130px; }
      #texto-resultado { font-size: 22px; }
      .opcao { width: 130px; font-size: 18px; padding: 12px 10px; }
      .btn-proxima, .btn-reiniciar { padding: 15px 30px; font-size: 20px; width: 100%; box-sizing: border-box; }
      .resumo-item { font-size: 18px; padding: 12px 20px; }
      
      /* Ajustes do contador e som no celular */
      .dica-e-som { flex-direction: column; text-align: center; }
      #dica { text-align: center; font-size: 20px; }
      .controles-som { flex-direction: row; margin-top: 15px; }
      .contador-perguntas { font-size: 14px; margin-bottom: 10px; }
    }

    @media (max-height: 768px) {
      /* --- Ajustes para Notebooks e Chromebooks --- */
      .img-capa-frente {
        max-height: 80vh; 
        margin-bottom: 10px; 
      }
      
      .logo-game { max-height: 70px; margin-top: 10px; margin-bottom: 10px; }
      .cartao-jogo { padding: 15px; margin-bottom: 20px; }
      #dica { font-size: 20px; margin-top: 10px; }
      .opcoes { margin-top: 15px; gap: 10px; }
      .opcao { margin-bottom: 5px; }
      #area-resultado { min-height: 160px; margin-top: 10px; }
      .btn-proxima { margin: 10px auto; }
    }
  </style>
</head>

<body>

  <div id="intro-screen">
    <div class="capa-container">
      <img src="img/capafundo.png" alt="Fundo" class="img-capa-fundo">
      <div class="conteudo-central">
        <img src="img/capafrente.png" alt="Capa" class="img-capa-frente">
        <button class="btn-jogar-capa" onclick="iniciarJogo()">▶ JOGAR</button>
      </div>
    </div>
  </div>

  <div id="game-screen">
    <img src="img/titulo.png" alt="Que Alimento é Esse?" class="logo-game">

    <div id="painel-quiz" class="cartao-jogo">
        <div class="dica-container">
          
          <div class="cabecalho-dica">
            <button class="btn-som" onclick="ativarSomManual()" title="Ouvir Dica">🔊</button>
            <div id="contador-perguntas" class="contador-perguntas">PERGUNTA 1 DE 10</div>
            <button class="btn-mudo" onclick="pararSom()" title="Silenciar">🔇</button>
          </div>
          
          <div id="dica">...</div>
          
        </div>

        <div class="opcoes" id="opcoes"></div>

        <div id="area-resultado">
          <img id="img-resposta" src="" alt="Imagem Resposta">
          <div id="texto-resultado"></div>
        </div>

        <button id="btn-proxima" class="btn-proxima" onclick="proxima()">PRÓXIMA ➜</button>
    </div>

    <div id="painel-final" class="cartao-jogo">
        <div id="mensagem-final">PARABÉNS!</div>
        
        <div class="resumo-placar">
            <div class="resumo-item bg-verde">
                ACERTOS: <span id="final-acertos">0</span>
            </div>
            <div class="resumo-item bg-vermelho">
                ERROS: <span id="final-erros">0</span>
            </div>
        </div>
        
        <div class="botoes-finais">
          <button class="btn-reiniciar" onclick="voltarParaIntro()">🔄 JOGAR NOVAMENTE</button>
          <button class="btn-sair" onclick="sairDoJogo()">🚪 SAIR DO JOGO</button>
        </div>
    </div>

  </div>

  <script>
    const bancoImagens = {
      "Maçã": "img/maca.png", "Uva": "img/uva.png", "Pera": "img/pera.png", "Limão": "img/limao.png",
      "Banana": "img/banana.png", "Abacaxi": "img/abacaxi.png", "Ameixa": "img/ameixa.png",
      "Jabuticaba": "img/jabuticaba.png", "Melancia": "img/melancia.png", "Mamão": "img/mamao.png",
      "Manga": "img/manga.png", "Melão": "img/melao.png", "Laranja": "img/laranja.png",
      "Tangerina": "img/tangerina.png", "Alface": "img/alface.png", "Couve": "img/couve.png",
      "Brócolis": "img/brocolis.png", "Batata": "img/batata.png", "Mandioca": "img/mandioca.png",
      "Cenoura": "img/cenoura.png", "Morango": "img/morango.png", "Tomate": "img/tomate.png", "Cebola": "img/cebola.png",
      "Milho": "img/milho.png", "Caju": "img/caju.png", "Abacate": "img/abacate.png",
      "Goiaba": "img/goiaba.png", "Abóbora": "img/abobora.png"
    };

    const todasAsPerguntas = [
      { dica: "Uma fruta redonda, vermelha ou verde e muito usada em sucos.", correta: "Maçã", opcoes: ["Maçã", "Uva", "Pera"] },
      { dica: "Uma fruta verde por fora e azeda por dentro. Faz um suco refrescante.", correta: "Limão", opcoes: ["Banana", "Limão", "Abacaxi"] },
      { dica: "É pequena, roxa ou verde e cresce em cachos.", correta: "Uva", opcoes: ["Uva", "Ameixa", "Jabuticaba"] },
      { dica: "Uma fruta doce, com casca fina e polpa macia.", correta: "Pera", opcoes: ["Maçã", "Pera", "Melancia"] },
      { dica: "Tem casca verde e por dentro é vermelha e cheia de sementes.", correta: "Melancia", opcoes: ["Mamão", "Melancia", "Abacaxi"] },
      { dica: "Tem uma coroa, mas não é rei. Tem espinhos e é amarelo por dentro.", correta: "Abacaxi", opcoes: ["Manga", "Abacaxi", "Banana"] },
      { dica: "É doce, macia e muito usada no café da manhã.", correta: "Mamão", opcoes: ["Mamão", "Melão", "Pera"] },
      { dica: "Tem o mesmo nome da sua cor e é famosa por ser rica em vitamina C.", correta: "Laranja", opcoes: ["Laranja", "Limão", "Tangerina"] },
      { dica: "Tem casca colorida, polpa amarela bem doce e tem um caroço no meio.", correta: "Manga", opcoes: ["Jabuticaba", "Abacaxi", "Manga"] },
      { dica: "Tem casca amarela e dura, é doce, refrescante e as sementes ficam todas juntas no centro.", correta: "Melão", opcoes: ["Melão", "Mamão", "Abacaxi"] },
      { dica: "Tem folhas verdes e leves. É muito usada em sanduíches e saladas cruas.", correta: "Alface", opcoes: ["Alface", "Couve", "Brócolis"] },
      { dica: "Nasce debaixo da terra e todo mundo adora quando viro purê ou fritas!", correta: "Batata", opcoes: ["Batata", "Mandioca", "Cenoura"] },
      { dica: "É pequeno, vermelho e tem as sementes do lado de fora. Faz uma sobremesa deliciosa.", correta: "Morango", opcoes: ["Uva", "Morango", "Maçã"] },
      { dica: "Muitos acham que é legume, mas é uma fruta vermelha muito usada em saladas e molhos de pizza.", correta: "Tomate", opcoes: ["Tomate", "Cebola", "Maçã"] },
      { dica: "Faz chorar quando é cortada, mas dá um sabor delicioso à comida.", correta: "Cebola", opcoes: ["Batata", "Cebola", "Cenoura"] },
      { dica: "É amarelo, cresce em espigas e vira uma pipoca deliciosa na panela.", correta: "Milho", opcoes: ["Milho", "Batata", "Mandioca"] },
      { dica: "Tem uma castanha na ponta e é uma fruta típica do Brasil. O seu suco é muito saboroso.", correta: "Caju", opcoes: ["Caju", "Goiaba", "Manga"] },
      { dica: "Tem a casca verde, um caroço grande no meio e pode ser comido doce ou na salada.", correta: "Abacate", opcoes: ["Abacate", "Mamão", "Melão"] },
      { dica: "Pode ser branca ou vermelha por dentro e é famosa por virar um doce.", correta: "Goiaba", opcoes: ["Goiaba", "Pera", "Maçã"] },
      { dica: "É grande, tem a casca dura e o interior cor-de-laranja. Fica uma delícia numa sopa bem quentinha ou num doce tradicional!", correta: "Abóbora", opcoes: ["Abóbora", "Melão", "Batata"] }
    ];

    let perguntasDaRodada = []; // Variável nova para guardar as 10 perguntas da vez
    let atual = 0;
    let respondeu = false;
    let acertos = 0;
    let erros = 0;
    let somLigado = true;

    // Função auxiliar para embaralhar um array (Fisher-Yates)
    function embaralhar(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function iniciarJogo() {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex'; 
      document.getElementById("painel-quiz").style.display = "flex";
      document.getElementById("painel-final").style.display = "none";
      
      atual = 0;
      acertos = 0;
      erros = 0;
      somLigado = true;
      
      // 1. Clona a lista completa para não alterar a original
      let perguntasCopiadas = [...todasAsPerguntas];
      
      // 2. Embaralha a lista copiada
      perguntasCopiadas = embaralhar(perguntasCopiadas);
      
      // 3. Pega apenas as 10 primeiras perguntas embaralhadas (ou menos, se o total for menor que 10)
      perguntasDaRodada = perguntasCopiadas.slice(0, 10);
      
      // 4. Se quiser embaralhar as opções de resposta também, pode descomentar a linha abaixo:
      // perguntasDaRodada.forEach(p => p.opcoes = embaralhar(p.opcoes));
      
      mostrar();
    }

    function falarTexto(texto, forcar = false) {
      if (!somLigado && !forcar) return;

      window.speechSynthesis.cancel();
      const voz = new SpeechSynthesisUtterance();
      voz.text = texto;
      voz.lang = "pt-BR";
      voz.rate = 1.1;
      window.speechSynthesis.speak(voz);
    }

    function pararSom() {
        window.speechSynthesis.cancel();
        somLigado = false; 
    }

    function ativarSomManual() {
        somLigado = true;
        if (atual < perguntasDaRodada.length) { // Mudou de perguntas para perguntasDaRodada
            falarTexto(perguntasDaRodada[atual].dica, true);
        }
    }

    function mostrar() {
      respondeu = false;
      const btnProxima = document.getElementById("btn-proxima");
      btnProxima.disabled = true;
      // Atualiza o texto do contador dinamicamente
      document.getElementById("contador-perguntas").innerText = "PERGUNTA " + (atual + 1) + " DE " + perguntasDaRodada.length;

      // Mudou de perguntas para perguntasDaRodada
      const p = perguntasDaRodada[atual]; 
      document.getElementById("dica").innerText = p.dica;
      
      falarTexto(p.dica);

      const area = document.getElementById("opcoes");
      area.innerHTML = "";
      p.opcoes.forEach(opcao => {
        const div = document.createElement("div");
        div.className = "opcao";
        div.innerText = opcao;
        div.onclick = () => responder(opcao);
        area.appendChild(div);
      });

      document.getElementById("texto-resultado").innerText = "";
      document.getElementById("img-resposta").style.display = "none";
      document.getElementById("area-resultado").classList.remove("animar-pop");
    }

    function responder(escolha) {
      if (respondeu) return;
      
      // Mudou de perguntas para perguntasDaRodada
      const correta = perguntasDaRodada[atual].correta;
      let mensagemVoz = "";
      const divResultado = document.getElementById("texto-resultado");
      const imgResultado = document.getElementById("img-resposta");
      const areaResultado = document.getElementById("area-resultado");
      const btnProxima = document.getElementById("btn-proxima");

      if (escolha === correta) {
        divResultado.innerText = "✅ Muito bem! A resposta é " + correta + "!";
        divResultado.style.color = "#2e7d32";
        mensagemVoz = "Muito bem! A resposta é " + correta + "!";
        acertos++; 
      } else {
        divResultado.innerText = "❌ Ops! A resposta correta é " + correta + "!";
        divResultado.style.color = "#c62828";
        mensagemVoz = "Ops! A resposta correta é " + correta + "!";
        erros++; 
      }

      const urlImagem = bancoImagens[correta] || "";
      if (urlImagem) {
        imgResultado.src = urlImagem;
        imgResultado.style.display = "block";
      }

      areaResultado.classList.remove("animar-pop");
      void areaResultado.offsetWidth;
      areaResultado.classList.add("animar-pop");
      
      respondeu = true;
      btnProxima.disabled = false;
      
      falarTexto(mensagemVoz);
    }

    function proxima() {
      if (!respondeu) return;

      atual++;
      // Mudou de perguntas para perguntasDaRodada
      if (atual < perguntasDaRodada.length) {
        mostrar();
      } else {
        document.getElementById("painel-quiz").style.display = "none"; 
        document.getElementById("painel-final").style.display = "flex"; 
        
        document.getElementById("final-acertos").innerText = acertos;
        document.getElementById("final-erros").innerText = erros;

        let msgVisual = ""; 
        let msgFalada = ""; 
        
        const total = acertos + erros;

        if (acertos === total) {
            msgVisual = "🏆 UAU! VOCÊ ACERTOU TUDO! PARABÉNS!";
            msgFalada = "Uau! Você acertou tudo! Parabéns!";
        } else if (acertos > erros) {
            msgVisual = "🎉 MUITO BEM! VOCÊ FOI INCRÍVEL!";
            msgFalada = "Muito bem! Você foi incrível!";
        } else {
            msgVisual = "💪 BOM JOGO! VAMOS TENTAR DE NOVO?";
            msgFalada = "Bom jogo! Vamos tentar de novo?";
        }

        document.getElementById("mensagem-final").innerText = msgVisual;
        falarTexto(msgFalada + " Você acertou " + acertos + " e errou " + erros);
      }
    }

    function voltarParaIntro() {
      window.speechSynthesis.cancel();
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('intro-screen').style.display = 'flex';
    }

    function sairDoJogo() {
      window.speechSynthesis.cancel();
      window.close();
      window.location.href = "about:blank";
    }
  </script>
</body>
</html>
