<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Quebra-Cabeça Numérico</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS DIVERTIDOS --- */
        :root {
            --cor-fundo: #85FFBD;
            --cor-fundo-gradiente: linear-gradient(45deg, #85FFBD 0%, #FFFB7D 100%);
            --cor-tabuleiro: #FFF;
            --cor-peca: #FF6B6B;
            --cor-peca-sombra: #C44D4D;
            --cor-texto: #FFFFFF;
        }

        body {
            font-family: 'Fredoka One', cursive; /* Fonte arredondada */
            background-image: var(--cor-fundo-gradiente);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Título Colorido */
        h1 {
            font-size: 3rem;
            color: #4A4A4A;
            text-shadow: 2px 2px 0px #FFF;
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.1;
        }

        /* Placar */
        .placar {
            background: #FFFFFF;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
            font-size: 1.5rem;
            color: #555;
            margin-bottom: 20px;
            border: 3px solid #FFD93D;
        }

        /* Menu de Seleção de Modo */
        #mode-selection {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--cor-fundo-gradiente);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
        }

        .btn-mode {
            margin: 10px;
            padding: 20px 40px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            background-color: var(--cor-peca);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--cor-peca-sombra);
            transition: all 0.1s;
            width: 250px;
        }

        .btn-mode:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .btn-mode:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--cor-peca-sombra);
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-family: 'Fredoka One', cursive;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #333;
        }

        .btn-back:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #333;
        }

        /* O Tabuleiro (Moldura) */
        .game-board {
            background-color: #FFD93D; /* Amarelo vivo */
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 0 #D4B218; /* Sombra dura para efeito 3D */
            display: inline-block;
            position: relative;
        }

        /* A Grade Interna (Agora dinâmica via JS) */
        .grid {
            display: grid;
            gap: 10px;
            background-color: #D4B218;
            padding: 10px;
            border-radius: 10px;
        }

        /* As Peças (Botões) */
        .tile {
            width: 100px;
            height: 100px;
            background-color: var(--cor-peca);
            color: var(--cor-texto);
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
            user-select: none;
            
            /* Efeito 3D no botão */
            box-shadow: 0 8px 0 var(--cor-peca-sombra);
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            top: 0;
        }

        /* Classe para 4x4 (peças menores para caber) */
        .grid-4 .tile {
            width: 75px;
            height: 75px;
            font-size: 2.2rem;
            border-radius: 10px;
        }

        .tile:hover {
            filter: brightness(1.1); /* Fica mais brilhante */
            transform: translateY(-2px);
        }

        .tile:active {
            /* Efeito de apertar o botão */
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--cor-peca-sombra);
        }

        /* A Peça Vazia (Buraco) */
        .tile.empty {
            background-color: #2E2E2E; /* Escuro para parecer um buraco */
            box-shadow: inset 0 0 15px #000; /* Sombra interna */
            cursor: default;
            opacity: 0.3;
        }

        /* Botão de Reiniciar */
        .btn-restart {
            margin-top: 20px;
            padding: 12px 30px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            background-color: #4D96FF;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #285EAB;
            transition: all 0.1s;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            background-color: #64A5FF;
        }

        .btn-restart:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #285EAB;
        }

        /* Tela de Vitória (Overlay) */
        #win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            color: white;
            text-align: center;
        }

        #win-overlay h2 {
            font-size: 4rem;
            color: #FFD93D;
            text-shadow: 4px 4px 0 #FF6B6B;
            margin: 0;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Partículas de Confete */
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 301;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
        
        /* Ajuste para celulares */
        @media (max-width: 450px) {
            h1 { font-size: 2rem; }
            .grid { gap: 5px; padding: 5px; }
            .tile { width: 70px; height: 70px; font-size: 2rem; }
            
            .grid-4 .tile {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div id="mode-selection">
        <h1>Números<br>Mágicos!</h1>
        <p style="font-size: 1.2rem; color: #555;">Escolha o tamanho do desafio:</p>
        <button class="btn-mode" onclick="setMode(3)">3x3 (Fácil)</button>
        <button class="btn-mode" onclick="setMode(4)">4x4 (Difícil)</button>
    </div>

    <button class="btn-back" onclick="showMenu()">⬅ Voltar</button>

    <h1>Números<br>Mágicos!</h1>
    
    <div class="placar">
        Movimentos: <span id="moves" style="color:#FF6B6B">0</span>
    </div>

    <div class="game-board">
        <div class="grid" id="board">
            </div>
    </div>

    <button class="btn-restart" onclick="startGame()">Misturar Tudo! 🔄</button>

    <div id="win-overlay" onclick="closeWin()">
        <h2>PARABÉNS! <br> VOCÊ VENCEU! 🎉</h2>
        <p>Toque na tela para jogar de novo</p>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const movesElement = document.getElementById('moves');
        const winOverlay = document.getElementById('win-overlay');
        const modeSelection = document.getElementById('mode-selection');
        
        let gridSize = 3;
        let tiles = [];
        let moveCount = 0;
        let isGameActive = false;

        function setMode(size) {
            gridSize = size;
            modeSelection.style.display = 'none';
            
            // Ajusta o CSS da grade
            boardElement.style.gridTemplateColumns = `repeat(${gridSize}, auto)`;
            
            if (gridSize === 4) {
                boardElement.classList.add('grid-4');
            } else {
                boardElement.classList.remove('grid-4');
            }
            
            startGame();
        }

        function showMenu() {
            modeSelection.style.display = 'flex';
            isGameActive = false;
        }

        function renderBoard() {
            boardElement.innerHTML = '';
            
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.classList.add('tile');
                
                if (tile === 0) {
                    div.classList.add('empty');
                } else {
                    div.innerText = tile;
                    div.onclick = () => moveTile(index);
                    
                    // Cores variadas para ficar divertido
                    const colors = ['#FF6B6B', '#4D96FF', '#6BCB77', '#FFD93D', '#A066CB', '#FF9F43'];
                    div.style.backgroundColor = colors[(tile - 1) % colors.length];
                    div.style.boxShadow = `0 8px 0 ${darkenColor(colors[(tile - 1) % colors.length])}`;
                }
                
                boardElement.appendChild(div);
            });
        }

        function darkenColor(color) {
            const map = {
                '#FF6B6B': '#C44D4D',
                '#4D96FF': '#285EAB',
                '#6BCB77': '#3E8E46',
                '#FFD93D': '#D4B218',
                '#A066CB': '#7B4FAB',
                '#FF9F43': '#D67E2F'
            };
            return map[color] || '#333';
        }

        function moveTile(index) {
            if (!isGameActive) return;

            const emptyIndex = tiles.indexOf(0);
            
            if (isAdjacent(index, emptyIndex)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                moveCount++;
                movesElement.innerText = moveCount;
                renderBoard();
                checkWin();
            } else {
                const tileElement = boardElement.children[index];
                tileElement.style.transform = 'translateX(5px)';
                setTimeout(() => tileElement.style.transform = 'translateX(0)', 100);
            }
        }

        function isAdjacent(index1, index2) {
            const r1 = Math.floor(index1 / gridSize), c1 = index1 % gridSize;
            const r2 = Math.floor(index2 / gridSize), c2 = index2 % gridSize;
            return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
        }

        function checkWin() {
            // Cria o estado de vitória dinamicamente
            const winState = [];
            for (let i = 1; i < gridSize * gridSize; i++) winState.push(i);
            winState.push(0);

            if (JSON.stringify(tiles) === JSON.stringify(winState) && moveCount > 0) {
                isGameActive = false;
                showConfetti();
                winOverlay.style.display = 'flex';
            }
        }

        function startGame() {
            // Inicializa tiles
            tiles = [];
            for (let i = 1; i < gridSize * gridSize; i++) tiles.push(i);
            tiles.push(0);

            moveCount = 0;
            movesElement.innerText = '0';
            isGameActive = true;
            winOverlay.style.display = 'none';

            // Embaralha
            const iterations = gridSize === 3 ? 150 : 300;
            for (let i = 0; i < iterations; i++) {
                const emptyIndex = tiles.indexOf(0);
                const possibleMoves = [];
                const offsets = [-1, 1, -gridSize, gridSize];
                
                offsets.forEach(offset => {
                    const neighbor = emptyIndex + offset;
                    if (neighbor >= 0 && neighbor < gridSize * gridSize && isAdjacent(emptyIndex, neighbor)) {
                        possibleMoves.push(neighbor);
                    }
                });
                
                const randomMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                [tiles[emptyIndex], tiles[randomMove]] = [tiles[randomMove], tiles[emptyIndex]];
            }
            renderBoard();
        }

        function closeWin() {
            winOverlay.style.display = 'none';
            startGame();
        }

        function showConfetti() {
            const colors = ['#FF6B6B', '#4D96FF', '#6BCB77', '#FFD93D', '#FFF'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // Inicia o jogo ao carregar
        startGame();

    </script>
</body>
</html>
