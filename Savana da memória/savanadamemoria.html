<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Savana da Memória</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color: #848d1c;
      --card-back: #ffbd61;
      --card-success: #90EE90;
      --card-error: #FF6961;
      --text-color: #555;
      --tamanho-carta: 110px;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background-image: url('img/fundojogo.png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      padding: 8vh 12vw 6vh 12vw;
      box-sizing: border-box;

      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      
      height: 100vh;
      max-height: 100vh;
      user-select: none;
      overflow: hidden;
    }

    /* ========================================= */
    /* ESTILOS ORIGINAIS PARA COMPUTADOR (PC)    */
    /* ========================================= */
    header {
      text-align: center;
      margin: 15px 0;
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nivel-badge {
      background: #3a7c2d;
      color: #f0ede8;
      padding: 6px 35px;
      border-radius: 15px;
      font-size: 1.3em;
      font-weight: bold;
      border: 3px dashed #bcdfa5;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      margin-bottom: 12px;
    }

    .painel {
      padding: 15px 30px;
      border-radius: 22px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      width: 100%;
      font-size: 1.3rem;
      color: #fff;
      font-weight: bold;
      box-sizing: border-box;
      position: relative;

      background: linear-gradient(180deg, #e4b06a 0%, #e7b873 40%, #dca45a 100%);
      border: 4px solid #a06a2e;
      box-shadow: 0 6px 0 #7a4d1f;
    }

    .painel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg,
          rgba(0, 0, 0, 0.08) 0px, rgba(0, 0, 0, 0.08) 2px,
          transparent 2px, transparent 14px);
      opacity: 0.25;
      pointer-events: none;
      border-radius: 18px;
    }

    .painel::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 12px 20px rgba(0, 0, 0, 0.15),
        inset 0 -12px 20px rgba(0, 0, 0, 0.1);
      border-radius: 18px;
      pointer-events: none;
    }

    .info-item { display: flex; align-items: center; gap: 10px; z-index: 5; }
    .botoes-controle { display: flex; gap: 15px; z-index: 5; }
    .btn-icon { border: none; background: none; cursor: pointer; font-size: 1.3rem; color: #fff; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3); transition: transform 0.2s; }
    .btn-icon:hover { transform: scale(1.2); color: #6c5ce7; }

    .game-area {
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      width: 100%;
      box-sizing: border-box;
    }

    .game-container {
      display: grid;
      gap: 10px;
      perspective: 1000px;
      justify-content: center;
      align-content: center;
    }

    .card {
      width: var(--tamanho-carta);
      height: var(--tamanho-carta);
      position: relative;
      cursor: pointer;
      transform: scale(1);
      transition: transform 0.1s;
    }

    .card:active { transform: scale(0.95); }

    .card-inner {
      width: 100%; height: 100%; position: absolute;
      transition: transform 0.6s; transform-style: preserve-3d;
    }

    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card.correto .card-inner { animation: pulo 0.5s ease-in-out; }
    .card.correto .card-back { background-color: var(--card-success); border-color: #72c772; }
    .card.erro .card-inner { animation: tremer 0.4s ease-in-out; }
    .card.erro .card-back { background-color: var(--card-error); }

    .card-front, .card-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 15px;
      display: flex; justify-content: center; align-items: center;
      border: 4px solid white; box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1); box-sizing: border-box;
    }

    .card-front { background-color: var(--card-back); color: white; font-size: calc(var(--tamanho-carta) / 2.5); }
    .card-back { background-color: #fff; transform: rotateY(180deg); }
    .card-back img { width: 80%; height: 80%; object-fit: contain; }

    @keyframes pulo {
      0%, 100% { transform: rotateY(180deg) scale(1) }
      50% { transform: rotateY(180deg) scale(1.15) }
    }
    @keyframes tremer {
      0%, 100% { transform: rotateY(180deg) translateX(0) }
      25% { transform: rotateY(180deg) translateX(-5px) }
      75% { transform: rotateY(180deg) translateX(5px) }
    }

    #overlay-inicio {
      position: fixed; inset: 0; background-image: url('img/capajogo.png');
      background-position: center; background-size: cover; background-color: #000;
      z-index: 200; display: flex; justify-content: center; align-items: center;
    }

    .btn-start {
      background: #FFB347; color: white; cursor: pointer; font-family: 'Fredoka', sans-serif;
      font-weight: bold; border-radius: 50px; white-space: nowrap; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
      animation: pulse 1.5s infinite; font-size: clamp(14px, 4vmin, 35px);
      padding: clamp(10px, 2.5vmin, 25px) clamp(25px, 7vmin, 70px);
      border: clamp(2px, 0.5vmin, 5px) solid white; box-shadow: 0 clamp(4px, 1vmin, 8px) 0 rgba(0, 0, 0, 0.2);
      margin-top: 60vh; margin-left: 2vh;
    }

    .btn-start:hover { transform: scale(1.05); background: #c0ab87; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    /* ========================================= */
    /* MODAL DE VITÓRIA                          */
    /* ========================================= */
    #modal-nivel {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 100;
    }

    .modal-content {
      background: #e2b06d; background-image: url('img/madeira2.png'); background-size: cover;
      padding: 45px 55px; border-radius: 18px; text-align: center; animation: modalUp 0.3s ease-out;
      box-shadow: 0 10px 0 #8a5a2f, 0 0 25px rgba(0, 0, 0, 0.4); border: 5px solid #8a5a2f; position: relative;
    }

    .modal-content:before, .modal-content:after {
      content: ""; position: absolute; top: -40px; width: 40px; height: 40px;
      background: url('img/corda.png') no-repeat center; background-size: contain;
    }
    .modal-content:before { left: 50px; } .modal-content:after { right: 50px; }
    @keyframes modalUp { from { transform: scale(0.5); } to { transform: scale(1); } }

    /* Classes novas para controlar o tamanho do texto do modal */
    .icone-vitoria { margin: 0; font-size: 4rem; }
    .titulo-vitoria { color: #6c5ce7; margin: 10px 0; font-size: 2rem; }
    .texto-vitoria { font-size: 1.2rem; color: #555; margin-bottom: 20px;}

    .btn-proximo {
      background: #6c5ce7; color: white; border: none; padding: 15px 40px;
      font-size: 1.5rem; border-radius: 50px; cursor: pointer; margin-top: 15px;
      font-weight: bold; box-shadow: 0 5px 0 #4834d4; transition: transform 0.1s;
    }

    /* ========================================= */
    /* AJUSTES PARA CHROMEBOOKS E NOTEBOOKS      */
    /* ========================================= */
    @media screen and (max-width: 1024px), screen and (max-height: 800px) {
      header { margin: 8px 0; }
      .painel { padding: 8px 20px; font-size: 1.1rem; }
      .nivel-badge { padding: 4px 25px; font-size: 1.1em; margin-bottom: 8px; }
      .btn-icon { font-size: 1.1rem; }
      
      /* Reduzindo o modal um pouco */
      .modal-content { padding: 30px 40px; border-width: 4px; }
      .icone-vitoria { font-size: 3rem; }
      .titulo-vitoria { font-size: 1.6rem; }
      .btn-proximo { padding: 12px 30px; font-size: 1.3rem; }
    }

    /* ========================================= */
    /* AJUSTES PARA CELULARES NA HORIZONTAL      */
    /* ========================================= */
    @media screen and (max-height: 500px) {
      body { padding: 10vh 6vw 3vh 6vw; }
      header { margin: 5px 0; width: 98%; }
      .painel { padding: 5px 15px; font-size: 0.95rem; border-width: 3px; }
      .btn-icon { font-size: 1rem; }
      .nivel-badge { padding: 3px 20px; font-size: 1em; margin-bottom: 5px; border-width: 2px;}
      .info-item { gap: 5px; }
      .game-container { gap: 6px; } /* Cartas um pouco mais juntas no mobile */
      .game-area { margin-top: -13px;}

      /* Reduzindo o modal BASTANTE para caber no celular deitado */
      .modal-content { padding: 15px 25px; border-width: 3px; border-radius: 12px; box-shadow: 0 6px 0 #8a5a2f; }
      .icone-vitoria { font-size: 2.2rem; }
      .titulo-vitoria { font-size: 1.3rem; margin: 5px 0; }
      .texto-vitoria { font-size: 0.95rem; margin-bottom: 10px; }
      .btn-proximo { padding: 8px 20px; font-size: 1rem; margin-top: 5px; box-shadow: 0 4px 0 #4834d4;}
      
      /* Encolhe as cordinhas decorativas do modal */
      .modal-content:before, .modal-content:after { transform: scale(0.6); top: -28px; }
    }

    /* Trava Celular Vertical */
    @media screen and (max-width: 900px) and (orientation: portrait) {
      body::before {
        content: "🔄 Gire o celular para jogar na horizontal";
        position: fixed; inset: 0; background: #000; color: #fff;
        display: flex; justify-content: center; align-items: center;
        text-align: center; font-size: 1.5rem; padding: 20px; z-index: 9999;
      }
      body>* { display: none; }
    }
  </style>
</head>

<body>

  <div id="overlay-inicio">
    <button class="btn-start" onclick="comecarJogo()">JOGAR ▶</button>
  </div>

  <header>
    <div class="nivel-badge">Nível <span id="nivel-atual">1</span></div>

    <div class="painel">
      <div class="info-item" title="Jogadas"><i class="fas fa-hand-pointer"></i> <span id="jogadas">0</span></div>
      <div class="info-item" title="Pares Encontrados"><i class="fas fa-check-double"></i> <span id="pares-encontrados">0/0</span></div>
      <div class="info-item" title="Tempo"><i class="fas fa-stopwatch"></i> <span id="tempo">00:00</span></div>

      <div class="botoes-controle">
        <button onclick="alternarMusica()" class="btn-icon" title="Ligar/Desligar Música">
          <i id="icone-musica" class="fas fa-music"></i>
        </button>
        <button onclick="reiniciarNivel()" class="btn-icon" title="Reiniciar Nível">
          <i class="fas fa-redo"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="game-area">
    <div class="game-container" id="game"></div>
  </div>

  <div id="modal-nivel">
    <div class="modal-content">
      <h1 class="icone-vitoria">🎉</h1>
      <h2 class="titulo-vitoria">Nível Concluído!</h2>
      <p id="msg-vitoria" class="texto-vitoria">Excelente memória!</p>
      <button class="btn-proximo" onclick="proximoNivel()">Próximo Nível <i class="fas fa-arrow-right"></i></button>
    </div>
  </div>

  <audio id="musica-fundo" loop>
    <source src="musicajogo.mp3" type="audio/mpeg">
  </audio>

  <script>
    let tempoTotal = 0;

    const todosAnimais = [
      "img/javali.png", "img/crocodilo.png", "img/hipopotamo.png",
      "img/rinoceronte.png", "img/cobra.png", "img/leopardo.png",
      "img/leao.png", "img/raposa.png", "img/elefante.png",
      "img/girafa.png", "img/macaco.png", "img/zebra.png"
    ];

    const niveis = [
      { pares: 3, colunas: 3 },
      { pares: 6, colunas: 4 },
      { pares: 8, colunas: 4 },
      { pares: 10, colunas: 5 },
      { pares: 12, colunas: 6 }
    ];

    let nivelAtual = 0;
    let viradas = [];
    let bloqueado = false;
    let jogadas = 0;
    let paresEncontrados = 0;
    let timerInterval;
    let segundos = 0;
    let jogoIniciado = false;

    let musicaTocando = false;
    const audioFundo = document.getElementById('musica-fundo');
    const iconeMusica = document.getElementById('icone-musica');

    const container = document.getElementById('game');
    const elJogadas = document.getElementById('jogadas');
    const elPares = document.getElementById('pares-encontrados');
    const elTempo = document.getElementById('tempo');
    const elNivel = document.getElementById('nivel-atual');
    const modal = document.getElementById('modal-nivel');
    const overlay = document.getElementById('overlay-inicio');

    function ajustarTamanhoCartas() {
      const config = niveis[nivelAtual];
      const totalCartas = config.pares * 2;
      const colunas = config.colunas;
      const linhas = Math.ceil(totalCartas / colunas);

      const header = document.querySelector('header');
      const headerHeight = header ? header.offsetHeight : 150;

      const estiloBody = window.getComputedStyle(document.body);
      const paddingVertical = parseFloat(estiloBody.paddingTop) + parseFloat(estiloBody.paddingBottom);
      const paddingHorizontal = parseFloat(estiloBody.paddingLeft) + parseFloat(estiloBody.paddingRight);

      // AUMENTADO: Margem de respiro extra para as cartas não grudarem nas bordas (era 15, agora é 40)
      const margemRespiro = 40; 
      const alturaDisponivel = window.innerHeight - headerHeight - paddingVertical - margemRespiro;
      const larguraDisponivel = window.innerWidth - paddingHorizontal - margemRespiro;

      const gap = window.innerHeight <= 500 ? 12 : 10; // Gap menor no celular

      const maxAlturaPorCarta = (alturaDisponivel - (gap * (linhas - 1))) / linhas;
      const maxLarguraPorCarta = (larguraDisponivel - (gap * (colunas - 1))) / colunas;

      let tamanhoFinal = Math.min(maxAlturaPorCarta, maxLarguraPorCarta);

      // NOVA TRAVA: Se for celular (tela pequena ou muito achatada), o tamanho máximo da carta é menor
      const isMobile = window.innerWidth <= 900 || window.innerHeight <= 500;
      const limiteMaximo = isMobile ? 60 : 150; // Celular = máx 85px | PC = máx 150px
      
      tamanhoFinal = Math.min(tamanhoFinal, limiteMaximo);

      document.documentElement.style.setProperty('--tamanho-carta', `${Math.floor(tamanhoFinal)}px`);
    }

    window.addEventListener('resize', () => {
      if (overlay.style.display === 'none') {
        ajustarTamanhoCartas();
      }
    });

    function comecarJogo() {
      audioFundo.volume = 0.25;
      audioFundo.play().then(() => {
        musicaTocando = true;
        iconeMusica.className = "fas fa-music";
        iconeMusica.style.color = "#6c5ce7";
      }).catch(() => {
        musicaTocando = false;
        iconeMusica.className = "fas fa-volume-mute";
        iconeMusica.style.color = "#FF6961";
      });

      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.display = 'none';
        ajustarTamanhoCartas();
      }, 500);

      iniciarNivelLogica();
    }

    function alternarMusica() {
      if (musicaTocando) {
        audioFundo.pause();
        musicaTocando = false;
        iconeMusica.className = "fas fa-volume-mute";
        iconeMusica.style.color = "#FF6961";
      } else {
        audioFundo.volume = 0.25;
        audioFundo.play().catch(() => console.log("Interação necessária"));
        musicaTocando = true;
        iconeMusica.className = "fas fa-music";
        iconeMusica.style.color = "#6c5ce7";
      }
    }

    function embaralhar(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function iniciarNivelLogica() {
      const config = niveis[nivelAtual];

      viradas = [];
      bloqueado = false;
      jogadas = 0;
      paresEncontrados = 0;
      segundos = 0;
      jogoIniciado = false;
      pararTimer();

      elJogadas.innerText = "0";
      elTempo.innerText = "00:00";
      elNivel.innerText = nivelAtual + 1;
      elPares.innerText = `0/${config.pares}`;

      modal.style.display = "none";
      container.style.gridTemplateColumns = `repeat(${config.colunas}, 1fr)`;
      
      ajustarTamanhoCartas();

      let listaCartas = [];
      let animaisDoNivel = embaralhar([...todosAnimais]);

      for (let i = 0; i < config.pares; i++) {
        let img = animaisDoNivel[i % animaisDoNivel.length];
        listaCartas.push(img, img);
      }

      listaCartas = embaralhar(listaCartas);
      renderizarCartas(listaCartas);
    }

    function renderizarCartas(cartas) {
      container.innerHTML = '';
      cartas.forEach(imgSrc => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.animal = imgSrc;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">?</div>
            <div class="card-back">
              <img src="${imgSrc}" alt="Animal">
            </div>
          </div>
        `;
        card.addEventListener('click', () => virarCarta(card));
        container.appendChild(card);
      });
    }

    function virarCarta(carta) {
      if (!jogoIniciado) { iniciarTimer(); jogoIniciado = true; }
      if (bloqueado || carta.classList.contains('flipped')) return;

      carta.classList.add('flipped');
      viradas.push(carta);

      if (viradas.length === 2) {
        jogadas++;
        elJogadas.innerText = jogadas;
        bloqueado = true;
        checarPar();
      }
    }

    function checarPar() {
      const [c1, c2] = viradas;
      const animal1 = c1.dataset.animal;
      const animal2 = c2.dataset.animal;

      if (animal1 === animal2) {
        paresEncontrados++;
        elPares.innerText = `${paresEncontrados}/${niveis[nivelAtual].pares}`;

        c1.classList.add('correto');
        c2.classList.add('correto');

        let nome = animal1.replace("img/", "").replace(".png", "");
        if (nome === "hipopotamo") nome = "hipopótamo";
        falar(nome);
        resetarJogada();

        if (paresEncontrados === niveis[nivelAtual].pares) {
          setTimeout(mostrarVitoria, 800);
        }
      } else {
        c1.classList.add('erro');
        c2.classList.add('erro');

        setTimeout(() => {
          c1.classList.remove('flipped', 'erro');
          c2.classList.remove('flipped', 'erro');
          resetarJogada();
        }, 1000);
      }
    }

    function resetarJogada() { viradas = []; bloqueado = false; }

    function iniciarTimer() {
      timerInterval = setInterval(() => {
        segundos++;
        const m = String(Math.floor(segundos / 60)).padStart(2, '0');
        const s = String(segundos % 60).padStart(2, '0');
        elTempo.innerText = `${m}:${s}`;
      }, 1000);
    }

    function pararTimer() { clearInterval(timerInterval); }

    function mostrarVitoria() {
      pararTimer();
      tempoTotal += segundos;

      const msg = document.getElementById('msg-vitoria');
      const btn = document.querySelector('.btn-proximo');

      if (nivelAtual < niveis.length - 1) {
        msg.innerText = `Nível ${nivelAtual + 1} completo em ${elTempo.innerText}!`;
        btn.innerHTML = `Ir para Nível ${nivelAtual + 2} <i class="fas fa-arrow-right"></i>`;
        btn.onclick = proximoNivel;
      } else {
        const minutos = String(Math.floor(tempoTotal / 60)).padStart(2, '0');
        const segundosFinais = String(tempoTotal % 60).padStart(2, '0');
        const tempoFinalFormatado = `${minutos}:${segundosFinais}`;

        msg.innerHTML = `
          PARABÉNS! Você zerou todos os níveis! 🎉<br><br>
          <strong>Seu tempo total foi:</strong><br>
          <span style="font-size: 2rem; color:#6c5ce7;">${tempoFinalFormatado}</span>
        `;
        btn.innerHTML = `Jogar Novamente <i class="fas fa-redo"></i>`;
        btn.onclick = () => {
          nivelAtual = 0; tempoTotal = 0;
          overlay.style.display = 'flex';
          setTimeout(() => overlay.style.opacity = '1', 10);
          musicaTocando = false; audioFundo.pause(); audioFundo.currentTime = 0;
          iniciarNivelLogica();
        };
      }
      modal.style.display = "flex";
    }

    function proximoNivel() { nivelAtual++; iniciarNivelLogica(); }
    function reiniciarNivel() { if (confirm("Reiniciar este nível?")) iniciarNivelLogica(); }

    let vozCarregada = false;
    window.speechSynthesis.onvoiceschanged = () => { vozCarregada = true; };

    function falar(texto) {
      if (!vozCarregada) return;
      if (musicaTocando) audioFundo.volume = 0.08;

      window.speechSynthesis.cancel();
      const voz = new SpeechSynthesisUtterance(texto);
      voz.lang = "pt-BR"; voz.rate = 0.9;

      voz.onend = () => { if (musicaTocando) audioFundo.volume = 0.25; };
      speechSynthesis.speak(voz);
    }
  </script>
</body>
</html>
